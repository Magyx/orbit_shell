[workspace]
resolver = "3"
members = [
  "src/orbit-common",
  "src/orbit-macros",
  "src/orbit-api",
  "src/orbitd",
  "src/orbit-dbus",
  "tools/xtask",
  "tools/orbit-cli",
  "tools/orbit-schema",
  "modules/wallpaper",
  "modules/bar",
  "modules/launcher",
  "modules/lockscreen",
]

[workspace.dependencies]
ui = { git = "https://github.com/Magyx/ui_lib.git", rev = "76672b3fce741d6ce6426e068895e39da95382a6" }
serde_yml = "0.0.12"
serde_json = "1.0.149"
tracing = "0.1.44"
libloading = "0.8.9"
zbus = "5.14.0"

